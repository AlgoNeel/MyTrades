<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trading Journal - Professional Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f8fafc;
            color: #0f172a;
            -webkit-tap-highlight-color: transparent;
        }

        /* Custom Scrollbar Styles */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        .table-wrap {
            height: calc(100vh - 250px);
            overflow: auto;
            position: relative;
            background: white;
            border-radius: 12px;
        }

        table {
            border-collapse: separate;
            border-spacing: 0;
            width: 100%;
            min-width: 1000px;
        }

        thead th {
            position: sticky;
            top: 0;
            z-index: 20;
            background-color: #ffffff;
            border-bottom: 1px solid #e2e8f0;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 0.05em;
            padding: 14px 12px;
            color: #64748b;
        }

        td {
            border-bottom: 1px solid #f1f5f9;
            padding: 8px 12px;
            transition: background 0.1s;
        }

        tr:hover td {
            background-color: #f8fafc;
        }

        input, select {
            width: 100%;
            padding: 6px 4px;
            border: 1px solid transparent;
            background: transparent;
            outline: none;
            font-size: 0.875rem;
            color: #334155;
            transition: all 0.2s;
        }

        input:focus, select:focus {
            background: #ffffff;
            border-color: #94a3b8;
            border-radius: 4px;
            box-shadow: 0 0 0 2px rgba(226, 232, 240, 0.5);
        }

        .details-row {
            background-color: #f8fafc;
            display: none;
        }

        .details-row.active {
            display: table-row;
        }

        .details-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 1.25rem;
            padding: 1.5rem;
            background: #ffffff;
            margin: 0.75rem;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.05);
        }

        .detail-item label {
            display: block;
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            color: #94a3b8;
            margin-bottom: 6px;
        }

        .detail-item input {
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            padding: 8px 10px;
            background: #fcfcfc;
        }

        .win-text { color: #10b981; }
        .loss-text { color: #ef4444; }
        .be-text { color: #94a3b8; }
        
        .btn-action {
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn-details {
            background-color: #f1f5f9;
            color: #475569;
            border: 1px solid #e2e8f0;
        }
        
        .btn-details:hover {
            background-color: #e2e8f0;
        }

        .delete-btn {
            color: #cbd5e1;
            transition: all 0.2s;
            cursor: pointer;
            padding: 4px;
        }
        .delete-btn:hover {
            color: #ef4444;
        }

        .capital-input {
            border-bottom: 1px solid #e2e8f0;
            font-weight: 700;
            width: 100px;
            text-align: right;
            color: #0f172a;
        }

        .stat-card {
            background: white;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            min-width: 110px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .stat-label {
            font-size: 0.65rem;
            font-weight: 700;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.025em;
            margin-bottom: 2px;
        }

        .stat-value {
            font-size: 1.125rem;
            font-weight: 800;
            color: #1e293b;
            line-height: 1.2;
        }

        .win-rate-bar {
            height: 4px;
            width: 100%;
            background: #f1f5f9;
            border-radius: 2px;
            margin-top: 6px;
            overflow: hidden;
        }

        .win-rate-fill {
            height: 100%;
            background: linear-gradient(to right, #10b981, #34d399);
            width: 0%;
            transition: width 0.5s ease-out;
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div id="modalContainer"></div>

    <div class="max-w-[1400px] mx-auto">
        <!-- Header Section -->
        <div class="flex flex-col lg:flex-row justify-between items-start lg:items-center gap-6 mb-8">
            <div>
                <div class="flex items-center gap-3 mb-1">
                    <h1 class="text-2xl font-black text-slate-900 tracking-tight">Trade Terminal</h1>
                    <div id="syncStatus" class="flex items-center gap-2 text-[10px] font-bold uppercase tracking-widest px-2 py-1 bg-slate-100 rounded-md text-slate-500">
                        <span class="w-1.5 h-1.5 rounded-full bg-slate-300"></span>
                        Offline
                    </div>
                </div>
                <div class="flex items-center gap-6">
                    <div class="flex flex-col">
                        <span class="text-[10px] uppercase font-bold text-slate-400">Initial Capital</span>
                        <input type="number" id="initialCapital" class="capital-input text-lg" placeholder="0.00" onchange="updateCapital(this.value)">
                    </div>
                    <div class="h-8 w-px bg-slate-200"></div>
                    <div class="flex flex-col">
                        <span class="text-[10px] uppercase font-bold text-slate-400">Live Balance</span>
                        <span id="currentBalance" class="text-lg font-black text-slate-900">0.00</span>
                    </div>
                </div>
            </div>

            <!-- Stats Dashboard -->
            <div class="grid grid-cols-2 sm:flex items-stretch gap-3 w-full lg:w-auto">
                <div class="stat-card">
                    <span class="stat-label">Total Trades</span>
                    <span id="statTotal" class="stat-value">0</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Win / Loss</span>
                    <span id="statWinLoss" class="stat-value text-slate-600">0 : 0</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Win Rate</span>
                    <span id="statWinRate" class="stat-value text-emerald-600">0%</span>
                    <div class="win-rate-bar"><div id="winRateFill" class="win-rate-fill"></div></div>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Duration</span>
                    <span id="statDuration" class="stat-value">0 <span class="text-[10px] font-normal text-slate-400">days</span></span>
                </div>
            </div>

            <!-- Global Actions -->
            <div class="flex flex-wrap gap-2 w-full lg:w-auto">
                <div class="flex bg-white rounded-lg p-1 border border-slate-200 shadow-sm">
                    <button onclick="createNewFile()" class="px-3 py-2 text-xs font-bold text-slate-600 hover:bg-slate-50 rounded-md transition">New</button>
                    <button onclick="openExistingFile()" class="px-3 py-2 text-xs font-bold text-slate-600 hover:bg-slate-50 rounded-md transition">Open</button>
                    <button id="btnSyncOut" onclick="syncOut()" class="hidden px-3 py-2 text-xs font-bold text-red-600 hover:bg-red-50 rounded-md transition">Disconnect</button>
                </div>
                <button onclick="addRow()" class="bg-indigo-600 text-white px-6 py-2.5 rounded-lg text-sm font-bold hover:bg-indigo-700 transition shadow-md shadow-indigo-100">+ New Entry</button>
                <button onclick="showModal('clearAll')" class="text-slate-400 hover:text-red-500 transition px-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd" /></svg>
                </button>
            </div>
        </div>

        <!-- Table Section -->
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="table-wrap">
                <table id="journalTable">
                    <thead>
                        <tr>
                            <th class="w-12"></th>
                            <th class="text-left w-32">Date</th>
                            <th class="text-left w-28">Asset</th>
                            <th class="text-left w-20">Type</th>
                            <th class="text-left w-24">Result</th>
                            <th class="text-right w-24">R Mult.</th>
                            <th class="text-right w-24">Fee</th>
                            <th class="text-right w-28 font-bold">Net P/L</th>
                            <th class="text-center w-28">Analysis</th>
                            <th class="text-center w-36">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'trading_journal_data_v2';
        const CAPITAL_KEY = 'trading_journal_capital_v2';

        let trades = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [
            { id: Date.now(), date: new Date().toISOString().split('T')[0], asset: '', type: 'Long', setup: '', chart: '', entry: '', sl: '', tp: '', size: '', exit: '', result: 'BE', r_multiple: '', pnl: '', commission: '' }
        ];
        let initialCapital = parseFloat(localStorage.getItem(CAPITAL_KEY)) || 0;
        let tradeIdPendingDelete = null;
        let fileHandle = null;

        async function save() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(trades));
            localStorage.setItem(CAPITAL_KEY, initialCapital);
            if (fileHandle) await writeToLocalFile();
        }

        async function createNewFile() {
            try {
                const handle = await window.showSaveFilePicker({
                    suggestedName: `journal-${new Date().toISOString().split('T')[0]}.json`,
                    types: [{ description: 'JSON', accept: { 'application/json': ['.json'] } }],
                });
                fileHandle = handle;
                updateSyncUI(true);
                await writeToLocalFile();
            } catch (err) {}
        }

        async function openExistingFile() {
            try {
                const [handle] = await window.showOpenFilePicker({ types: [{ accept: { 'application/json': ['.json'] } }] });
                const file = await handle.getFile();
                const content = await file.text();
                const data = JSON.parse(content);
                if (data.trades) {
                    trades = data.trades;
                    initialCapital = data.initialCapital || 0;
                    fileHandle = handle;
                    updateSyncUI(true);
                    render();
                    save();
                }
            } catch (err) {}
        }

        function syncOut() {
            fileHandle = null;
            localStorage.removeItem(STORAGE_KEY);
            localStorage.removeItem(CAPITAL_KEY);
            trades = [{ id: Date.now(), date: new Date().toISOString().split('T')[0], asset: '', type: 'Long', setup: '', chart: '', entry: '', sl: '', tp: '', size: '', exit: '', result: 'BE', r_multiple: '', pnl: '', commission: '' }];
            initialCapital = 0;
            updateSyncUI(false);
            render();
        }

        async function writeToLocalFile() {
            if (!fileHandle) return;
            try {
                const writable = await fileHandle.createWritable();
                await writable.write(JSON.stringify({ trades, initialCapital, lastSaved: new Date().toISOString() }, null, 2));
                await writable.close();
            } catch (err) { fileHandle = null; updateSyncUI(false); }
        }

        function updateSyncUI(active) {
            const status = document.getElementById('syncStatus');
            const syncBtn = document.getElementById('btnSyncOut');
            status.innerHTML = active ? `<span class="w-1.5 h-1.5 rounded-full bg-emerald-500"></span> Connected` : `<span class="w-1.5 h-1.5 rounded-full bg-slate-300"></span> Offline`;
            active ? syncBtn.classList.remove('hidden') : syncBtn.classList.add('hidden');
        }

        function updateCapital(val) {
            initialCapital = parseFloat(val) || 0;
            calculateTotalBalance();
            save();
        }

        function updateTrade(id, field, value) {
            const trade = trades.find(t => t.id === id);
            if (trade) {
                trade[field] = value;
                calculateTotalBalance();
                save();
            }
        }

        function toggleDetails(id) {
            const el = document.getElementById(`details-${id}`);
            const btn = document.getElementById(`btn-${id}`);
            const isActive = el.classList.toggle('active');
            btn.innerText = isActive ? 'Close' : 'Details';
            btn.className = isActive ? 'btn-action bg-slate-800 text-white' : 'btn-action btn-details';
        }

        function addRow() {
            const newTrade = { id: Date.now(), date: new Date().toISOString().split('T')[0], asset: '', type: 'Long', setup: '', chart: '', entry: '', sl: '', tp: '', size: '', exit: '', result: 'BE', r_multiple: '', pnl: '', commission: '' };
            trades.unshift(newTrade);
            render();
            save();
        }

        function showModal(type, id = null) {
            const container = document.getElementById('modalContainer');
            tradeIdPendingDelete = id;
            let title = "Confirm Delete", message = "Remove this trade entry permanently?", confirmAction = "confirmDelete()", verification = "";
            
            if (type === 'clearAll') {
                const cur = document.getElementById('currentBalance').innerText;
                title = "Security Check";
                message = `Enter current balance <strong>(${cur})</strong> to wipe all data.`;
                confirmAction = `validateAndClearAll('${cur}')`;
                verification = `<input type="text" id="clearVerifyInput" class="w-full mt-4 p-3 bg-slate-50 border border-slate-200 rounded-lg text-center font-bold">`;
            }

            container.innerHTML = `
                <div class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center z-[100] p-4">
                    <div class="bg-white rounded-2xl p-6 w-full max-w-sm shadow-2xl scale-in">
                        <h2 class="text-lg font-bold text-slate-900 mb-1">${title}</h2>
                        <p class="text-slate-500 text-sm mb-4">${message}</p>
                        ${verification}
                        <div class="flex gap-2 mt-6">
                            <button onclick="closeModal()" class="flex-1 py-2.5 text-sm font-bold text-slate-500 hover:bg-slate-50 rounded-xl transition">Cancel</button>
                            <button onclick="${confirmAction}" class="flex-1 py-2.5 text-sm font-bold bg-red-500 text-white hover:bg-red-600 rounded-xl shadow-lg shadow-red-100 transition">Confirm</button>
                        </div>
                    </div>
                </div>
            `;
        }

        function closeModal() { document.getElementById('modalContainer').innerHTML = ''; }
        function confirmDelete() {
            if (tradeIdPendingDelete) { trades = trades.filter(t => t.id !== tradeIdPendingDelete); trades.length === 0 ? addRow() : render(); save(); }
            closeModal();
        }
        function validateAndClearAll(req) {
            if (document.getElementById('clearVerifyInput').value.replace(/,/g, '') === req.replace(/,/g, '')) {
                trades = []; addRow(); save(); closeModal();
            }
        }

        function calculateTotalBalance() {
            let totalNetPL = 0, wins = 0, losses = 0, dates = [];
            trades.forEach(t => { 
                const pnl = parseFloat(t.pnl) || 0, comm = parseFloat(t.commission) || 0;
                totalNetPL += (pnl - comm); 
                if (t.result === 'Win') wins++; else if (t.result === 'Loss') losses++;
                if (t.date) dates.push(new Date(t.date));
            });

            const currentBalance = initialCapital + totalNetPL;
            const display = document.getElementById('currentBalance');
            display.innerText = currentBalance.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            display.className = `text-lg font-black ${currentBalance >= initialCapital ? 'text-emerald-600' : 'text-red-500'}`;

            document.getElementById('statTotal').innerText = trades.length;
            document.getElementById('statWinLoss').innerText = `${wins} : ${losses}`;
            const wr = trades.length > 0 ? ((wins / trades.length) * 100).toFixed(0) : 0;
            document.getElementById('statWinRate').innerText = `${wr}%`;
            document.getElementById('winRateFill').style.width = `${wr}%`;

            if (dates.length > 1) {
                const diff = Math.ceil(Math.abs(new Date(Math.max(...dates)) - new Date(Math.min(...dates))) / (1000 * 60 * 60 * 24));
                document.getElementById('statDuration').innerHTML = `${diff} <span class="text-[10px] font-normal text-slate-400">days</span>`;
            } else {
                document.getElementById('statDuration').innerHTML = `0 <span class="text-[10px] font-normal text-slate-400">days</span>`;
            }
        }

        function render() {
            const tbody = document.getElementById('tableBody');
            document.getElementById('initialCapital').value = initialCapital || '';
            tbody.innerHTML = '';

            trades.forEach(trade => {
                const net = (parseFloat(trade.pnl) || 0) - (parseFloat(trade.commission) || 0);
                const pnlClass = net > 0 ? 'text-emerald-600 font-bold' : (net < 0 ? 'text-red-500 font-bold' : 'text-slate-300');
                const resultClass = trade.result === 'Win' ? 'win-text font-bold' : (trade.result === 'Loss' ? 'loss-text font-bold' : 'be-text font-bold');

                const row = document.createElement('tr');
                row.innerHTML = `
                    <td class="text-center"><button onclick="showModal('deleteSingle', ${trade.id})" class="delete-btn opacity-0 group-hover:opacity-100 transition">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                    </button></td>
                    <td><input type="date" value="${trade.date}" class="font-medium" onchange="updateTrade(${trade.id}, 'date', this.value)"></td>
                    <td><input type="text" placeholder="Ticker" value="${trade.asset}" class="font-bold uppercase tracking-wider" onchange="updateTrade(${trade.id}, 'asset', this.value)"></td>
                    <td><select onchange="updateTrade(${trade.id}, 'type', this.value)"><option value="Long" ${trade.type==='Long'?'selected':''}>Long</option><option value="Short" ${trade.type==='Short'?'selected':''}>Short</option></select></td>
                    <td><select class="${resultClass}" onchange="updateTrade(${trade.id}, 'result', this.value); render()"><option value="Win" ${trade.result==='Win'?'selected':''}>Win</option><option value="Loss" ${trade.result==='Loss'?'selected':''}>Loss</option><option value="BE" ${trade.result==='BE'?'selected':''}>BE</option></select></td>
                    <td><input type="number" step="any" class="text-right font-mono text-slate-500" placeholder="0" value="${trade.r_multiple}" onchange="updateTrade(${trade.id}, 'r_multiple', this.value)"></td>
                    <td><input type="number" step="any" class="text-right font-mono text-slate-400" placeholder="0.00" value="${trade.commission || ''}" onchange="updateTrade(${trade.id}, 'commission', this.value); render()"></td>
                    <td><input type="number" step="any" class="text-right font-mono ${pnlClass}" placeholder="0.00" value="${trade.pnl}" onchange="updateTrade(${trade.id}, 'pnl', this.value); render()"></td>
                    <td class="text-center">${trade.chart ? `<a href="${trade.chart}" target="_blank" class="text-indigo-500 font-bold text-[10px] uppercase">Link</a>` : `<span class="text-slate-200 text-[10px]">None</span>`}</td>
                    <td class="text-center"><button id="btn-${trade.id}" onclick="toggleDetails(${trade.id})" class="btn-action btn-details">Details</button></td>
                `;
                row.className = "group";
                
                const detail = document.createElement('tr');
                detail.id = `details-${trade.id}`;
                detail.className = 'details-row';
                detail.innerHTML = `
                    <td colspan="10">
                        <div class="details-grid">
                            <div class="detail-item"><label>Trading Strategy</label><input type="text" value="${trade.setup}" onchange="updateTrade(${trade.id}, 'setup', this.value)"></div>
                            <div class="detail-item"><label>Chart Evidence</label><input type="text" value="${trade.chart}" placeholder="TradingView URL" onchange="updateTrade(${trade.id}, 'chart', this.value); render()"></div>
                            <div class="detail-item"><label>Entry Target</label><input type="number" step="any" value="${trade.entry}" onchange="updateTrade(${trade.id}, 'entry', this.value)"></div>
                            <div class="detail-item"><label>Invalidation (SL)</label><input type="number" step="any" value="${trade.sl}" onchange="updateTrade(${trade.id}, 'sl', this.value)"></div>
                            <div class="detail-item"><label>Objective (TP)</label><input type="number" step="any" value="${trade.tp}" onchange="updateTrade(${trade.id}, 'tp', this.value)"></div>
                            <div class="detail-item"><label>Risk Amount</label><input type="number" step="any" value="${trade.size}" placeholder="$0.00" onchange="updateTrade(${trade.id}, 'size', this.value)"></div>
                            <div class="detail-item"><label>Exit Price</label><input type="number" step="any" value="${trade.exit}" onchange="updateTrade(${trade.id}, 'exit', this.value)"></div>
                        </div>
                    </td>
                `;
                tbody.appendChild(row);
                tbody.appendChild(detail);
            });
            calculateTotalBalance();
        }

        window.onload = render;
    </script>
</body>
</html>
